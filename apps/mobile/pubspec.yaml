name: RemiMinder
description: A healthcare companion app for patients and caregivers

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.0

  # Networking & Authentication
  http: ^1.1.0
  google_sign_in: ^6.2.1
  flutter_dotenv: ^5.1.0

  # Firebase (initialized but not used for auth yet)
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0

  # Secure Storage (for JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Local Storage (for app preferences)
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  jwt_decoder: ^2.0.1
  equatable: ^2.0.5
  crypto: ^3.0.3
  uuid: ^4.2.1
  encrypt: ^5.0.1

  # Charts
  fl_chart: ^0.66.2

  # Permissions & Media
  permission_handler: ^11.3.0
  camera: ^0.10.5+9
  record: 6.1.2
  speech_to_text: ^5.1.0
  image_picker: ^1.1.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon.png
    # Environment configuration
    - .env
    # Logo assets for authentication (currently JPEG, ideally SVG)
    - assets/images/google_logo.svg
    # - assets/images/apple_logo.svg  # Not available yet
    # Custom role icons
    - assets/images/patient_icon.svg
    - assets/images/caregiver_icon.svg

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_28pt-Regular.ttf
        - asset: assets/fonts/Inter_28pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_28pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_28pt-Bold.ttf
          weight: 700

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#F8F4E8"
    theme_color: "#1B4E59"
