name: RemiMinder
description: A healthcare companion app for patients and caregivers

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.0

  # Networking & Authentication
  http: ^1.1.0
  supabase_flutter: ^2.0.0
  flutter_dotenv: ^5.1.0
  google_sign_in: ^6.2.1

  # Secure Storage (for JWT tokens)
  flutter_secure_storage: ^9.0.0

  # Local Storage (for app preferences)
  shared_preferences: ^2.2.2

  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  jwt_decoder: ^2.0.1
  equatable: ^2.0.5

  # Permissions & Media
  permission_handler: ^11.3.0
  camera: ^0.10.5+9
  # record: ^5.1.2  # Temporarily disabled due to build issues
  image_picker: ^1.1.1
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon.png
    # Logo assets for authentication (currently JPEG, ideally SVG)
    - assets/images/google_logo.svg  # Currently a JPEG file
    # - assets/images/apple_logo.svg
    # Custom role icons
    - assets/images/patient_icon.svg
    - assets/images/caregiver_icon.svg

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        # TODO: Add these Poppins weights when downloaded:
        # - asset: assets/fonts/Poppins-Medium.ttf
        #   weight: 500
        # - asset: assets/fonts/Poppins-SemiBold.ttf
        #   weight: 600

# App Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"  # Standard location
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/icon.png"  # Standard location
    background_color: "#F8F4E8"
    theme_color: "#1B4E59"
