<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="caregiverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4E59;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3AA8A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="patientSecondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3AA8A1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#557A7F;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="heartGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F8F4E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3AA8A1;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Caregiver (left person) - primary figure with gradient -->
  <circle cx="8" cy="7" r="2.5" fill="url(#caregiverGradient)"/>
  <path d="M8 12c-2.5 0-4.5 1.5-4.5 3v1h9v-1c0-1.5-2-3-4.5-3z" fill="url(#caregiverGradient)"/>
  <!-- Person being cared for (right person, smaller) with secondary gradient -->
  <circle cx="16" cy="8" r="2" fill="url(#patientSecondaryGradient)"/>
  <path d="M16 12c-1.5 0-2.5 1-2.5 2v0.5h5v-0.5c0-1-1-2-2.5-2z" fill="url(#patientSecondaryGradient)"/>
  <!-- Helping heart gesture -->
  <path d="M10 9c0-0.5 0.5-1 1-1s1 0.5 1 1v3h-2v-3z" fill="url(#heartGradient)"/>
  <!-- Connection line with theme color -->
  <path d="M11 9c1 0 2 0.5 3 1" stroke="url(#caregiverGradient)" stroke-width="2" fill="none" opacity="0.7"/>
</svg>
